# D&D Game Server Configuration

server:
  host: 0.0.0.0
  port: 8080
  read_timeout: 30
  write_timeout: 30

# Log configuration
log:
  level: debug
  format: console
  output: stdout

# CORS configuration
cors:
  allowed_origins:
    - http://localhost:5173
    - http://localhost:3000
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed_headers:
    - Content-Type
    - Authorization

# WebSocket configuration
websocket:
  read_buffer_size: 1024
  write_buffer_size: 1024
  ping_period: 54
  pong_wait: 60

# Game configuration
game:
  max_players_per_room: 6
  turn_timeout: 30000
  auto_save_interval: 60000

# LLM configuration
llm:
  # Supported providers: minimax, openai, glm
  provider: minimax
  openai:
    api_key: ${MINIMAX_API_KEY:-}
    base_url: ${MINIMAX_BASE_URL:-https://api.minimaxi.com/v1}
    model: ${MINIMAX_MODEL:-MiniMax-M2.7}

# Persistence configuration
persistence:
  data_dir: ./data/sessions
  auto_save: true
